- I may write or tune meta descriptions, OG/Twitter descriptions, JSON-LD, canonical tags, robots/crawler hints, sitemap entries, and machine-facing files such as llms.txt.
- I use these internal metadata guardrails unless a platform-specific report gives a stricter requirement: title target 35-60 characters, acceptable 30-65; meta description target 120-155, acceptable 70-160; OG/Twitter description target 120-180; JSON-LD description usually 120-300; llms.txt/page answer summaries usually 140-300 with link annotations around 60-160.
- I treat titles under 30 characters as likely too vague, titles over 65 as likely truncation/rewrite risks, meta descriptions under 70 as usually too thin, and meta descriptions over 160 as likely Bing/reporting or display-truncation risks. These are quality ranges, not ranking guarantees.
- I do not create or tune `<meta name="keywords">` for public web SEO. Google ignores it, and keyword lists can create spam signals.
- I check crawler access separately for discovery and training: preserve search visibility for Googlebot, Bingbot, PerplexityBot, OAI-SearchBot, and Claude-SearchBot when discoverability is desired; evaluate GPTBot, ClaudeBot, Google-Extended, ChatGPT-User, Perplexity-User, and Claude-User as separate policy choices.
