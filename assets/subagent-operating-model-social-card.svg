<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="Subagent Operating Model social card: one router routes to minimum capabilities, gates quality, and returns a clean result.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfc"/>
      <stop offset="0.56" stop-color="#eef5f7"/>
      <stop offset="1" stop-color="#e7f0f2"/>
    </linearGradient>
    <linearGradient id="router" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6f8f"/>
      <stop offset="1" stop-color="#1f4f6a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2f6f8f"/>
    </marker>
    <style>
      text{font-family:"Segoe UI Variable Text","Segoe UI",ui-sans-serif,system-ui,sans-serif;letter-spacing:0}
      .eyebrow{font-family:"Segoe UI Variable Small","Segoe UI",ui-sans-serif,system-ui,sans-serif;font-size:24px;font-weight:780;fill:#55717f}
      .title{font-family:"Segoe UI Variable Display","Segoe UI",ui-sans-serif,system-ui,sans-serif;font-size:56px;font-weight:780;fill:#111827}
      .subtitle{font-size:28px;font-weight:650;fill:#334b5b}
      .label{font-size:23px;font-weight:760;fill:#142235}
      .small{font-size:17px;font-weight:700;fill:#536476}
      .tiny{font-size:14px;font-weight:700;fill:#647383}
      .footer{font-size:20px;font-weight:760;fill:#344456}
      .reverse{fill:#ffffff}
      .node{fill:#fff;stroke:#cedde4;stroke-width:2}
      .lane{fill:#f7fafb;stroke:#d8e5ea;stroke-width:2}
      .gate{fill:#fff9eb;stroke:#c9922e;stroke-width:2}
      .flow{fill:none;stroke:#2f6f8f;stroke-width:4;stroke-linecap:round}
      .handoff{fill:none;stroke:#9fb4c0;stroke-width:2.4;stroke-dasharray:6 7;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="543" rx="22" fill="#ffffff" stroke="#d7e4e9" stroke-width="2"/>

  <text x="84" y="112" class="eyebrow">AI WORKFLOW DESIGN</text>
  <text x="84" y="188" class="title">One router turns agent</text>
  <text x="84" y="250" class="title">sprawl into governed work.</text>
  <text x="86" y="319" class="subtitle">Minimum roles. Tight handoffs. Quality gates.</text>

  <g transform="translate(820 86)">
    <rect class="lane" width="302" height="150" rx="18"/>
    <text x="32" y="54" class="label">What it prevents</text>
    <text x="32" y="91" class="small">Duplicate context.</text>
    <text x="32" y="119" class="small">Overlapping roles.</text>
    <text x="32" y="143" class="small">Ungated output.</text>
  </g>

  <g transform="translate(84 410)">
    <rect class="node" x="0" y="0" width="130" height="78" rx="16"/>
    <text x="65" y="47" text-anchor="middle" class="label">Request</text>
    <path class="flow" d="M146 39 H194" marker-end="url(#arrow)"/>

    <circle cx="270" cy="39" r="70" fill="#f3f8fa" stroke="#2f6f8f" stroke-width="3"/>
    <circle cx="270" cy="39" r="38" fill="url(#router)"/>
    <text x="270" y="47" text-anchor="middle" class="label reverse">Router</text>
    <path class="flow" d="M344 39 H398" marker-end="url(#arrow)"/>

    <g transform="translate(414 -34)">
      <rect class="lane" width="170" height="146" rx="18"/>
      <text x="85" y="34" text-anchor="middle" class="small">Minimum plan</text>
      <rect x="24" y="54" width="56" height="34" rx="9" fill="#edf3fb" stroke="#b8c8dc"/>
      <text x="52" y="76" text-anchor="middle" class="tiny">Plan</text>
      <path class="handoff" d="M86 71 H104"/>
      <rect x="110" y="54" width="38" height="34" rx="9" fill="#edf3fb" stroke="#b8c8dc"/>
      <text x="129" y="76" text-anchor="middle" class="tiny">UX</text>
      <path class="handoff" d="M129 92 V106"/>
      <rect x="100" y="112" width="48" height="30" rx="9" fill="#f7fafb" stroke="#cbd9df"/>
      <text x="124" y="132" text-anchor="middle" class="tiny">Build</text>
      <path class="handoff" d="M94 127 H80"/>
      <rect x="24" y="112" width="50" height="30" rx="9" fill="#fff9eb" stroke="#d6a044"/>
      <text x="49" y="132" text-anchor="middle" class="tiny">QA</text>
    </g>

    <path class="flow" d="M600 39 H658" marker-end="url(#arrow)"/>
    <rect class="gate" x="672" y="0" width="128" height="78" rx="16"/>
    <text x="736" y="34" text-anchor="middle" class="label">Quality</text>
    <text x="736" y="60" text-anchor="middle" class="label">gate</text>
    <path class="flow" d="M814 39 H878" marker-end="url(#arrow)"/>
    <rect class="node" x="892" y="0" width="130" height="78" rx="16"/>
    <text x="957" y="34" text-anchor="middle" class="label">Clean</text>
    <text x="957" y="60" text-anchor="middle" class="label">result</text>
  </g>

  <text x="84" y="554" class="footer">policani.net/resources.html#ai-tools</text>
</svg>
